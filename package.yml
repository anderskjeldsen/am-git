id: am-git
version: 0.1.0
type: application
dependencies:
  - id: am-lang-core
    realm: github
    type: git-repo
    tag: latest
    branch: master
    url: https://github.com/anderskjeldsen/am-lang-core.git
    features: ["floatingPoint"]
  - id: am-net
    realm: github
    type: git-repo
    tag: latest
    branch: master
    url: https://github.com/anderskjeldsen/am-net.git
  - id: am-ssl
    realm: github
    type: git-repo
    tag: latest
    branch: master
    url: https://github.com/anderskjeldsen/am-ssl.git
  - id: am-z
    realm: github
    type: git-repo
    tag: latest
    branch: master
    url: https://github.com/anderskjeldsen/am-z.git    
  - id: am-crypto
    realm: github
    type: git-repo
    tag: latest
    branch: master
    url: https://github.com/anderskjeldsen/am-crypto.git
  - id: am-json
    realm: github
    type: git-repo
    tag: latest
    branch: master
    url: https://github.com/anderskjeldsen/am-json.git
  - id: am-yaml
    realm: github
    type: git-repo
    tag: latest
    branch: master
    url: https://github.com/anderskjeldsen/am-yaml.git
  - id: am-web-client
    realm: github
    type: git-repo
    tag: latest
    branch: master
    url: https://github.com/anderskjeldsen/am-web-client.git

platforms:
  - id: libc
    abstract: true
  - id: amigaos
    extends: libc
    gccCommand: m68k-amigaos-gcc
    gccAdditionalOptions:
      - -noixemul
    additionalLinkerFlags:
      - -noixemul
  - id: linux-x64
    extends: libc
    gccCommand: gcc
  - id: macos
    extends: libc
    gccCommand: gcc -O3
  - id: macos-arm
    extends: libc
    gccCommand: gcc
  - id: morphos-ppc
    extends: libc
    gccCommand: ppc-morphos-gcc -O3
    gccAdditionalOptions:
      - -noixemul
    additionalLinkerFlags:
      - -noixemul

buildTargets:
  - id: amigaos_docker
    platform: amigaos
    dockerBuild:
      image: amiga-gcc
      buildPath: /host
  - id: macos
    platform: macos
  - id: macos-arm
    platform: macos-arm
  - id: linux-x64
    platform: linux-x64
  - id: morphos-ppc_docker
    platform: morphos-ppc
    commands:
      - docker run --rm -v "${build_dir}":/work -e USER=$( id -u ) -e GROUP=$( id -g ) -it amigadev/crosstools:ppc-morphos make -f morphos_ppc.makefile -C /work all

id: am-git
version: 0.1.0
type: application
dependencies:
  - id: am-lang-core
    type: local
    path: ../am-lang-core
    features: ["floatingPoint"]
  - id: am-net
    type: local
    path: ../am-net
  - id: am-ssl
    type: local
    path: ../am-ssl
  - id: am-z
    type: local
    path: ../am-z
  - id: am-crypto
    type: local
    path: ../am-crypto
  - id: am-json
    type: local
    path: ../am-json
  - id: am-yaml
    type: local
    path: ../am-yaml

platforms:
  - id: libc
    abstract: true
  - id: amigaos
    extends: libc
    gccCommand: m68k-amigaos-gcc
    gccAdditionalOptions:
      - -noixemul
    additionalLinkerFlags:
      - -noixemul
  - id: linux-x64
    extends: libc
    gccCommand: gcc
  - id: macos
    extends: libc
    gccCommand: gcc -O3
  - id: macos-arm
    extends: libc
    gccCommand: gcc
  - id: morphos-ppc
    extends: libc
    gccCommand: ppc-morphos-gcc -O3
    gccAdditionalOptions:
      - -noixemul
    additionalLinkerFlags:
      - -noixemul

buildTargets:
  - id: amigaos_docker
    platform: amigaos
    dockerBuild:
      image: amiga-gcc
      buildPath: /host
  - id: macos
    platform: macos
  - id: macos-arm
    platform: macos-arm
  - id: linux-x64
    platform: linux-x64
  - id: morphos-ppc_docker
    platform: morphos-ppc
    commands:
      - docker run --rm -v "${build_dir}":/work -e USER=$( id -u ) -e GROUP=$( id -g ) -it amigadev/crosstools:ppc-morphos make -f morphos_ppc.makefile -C /work all
